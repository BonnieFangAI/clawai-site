<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="g2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  
  <!-- Geometric claw mark - three angled rounded bars -->
  <g transform="translate(28, 20)">
    <rect x="8" y="12" width="12" height="75" rx="6" transform="rotate(-8, 14, 50)" fill="url(#g2)" opacity="0.65"/>
    <rect x="34" y="2" width="14" height="90" rx="7" transform="rotate(-3, 41, 47)" fill="url(#g2)" opacity="0.82"/>
    <rect x="62" y="8" width="12" height="80" rx="6" transform="rotate(4, 68, 48)" fill="url(#g2)"/>
  </g>
  
  <!-- ClawAI Text -->
  <text x="140" y="105" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="600" letter-spacing="4">
    <tspan fill="#F0F0F0">CLAW</tspan><tspan fill="url(#g1)">AI</tspan>
  </text>
  
  <!-- Subtle tagline -->
  <text x="142" y="132" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="400" letter-spacing="6" fill="#888888">
    AI DEPLOYMENT SERVICES
  </text>
</svg>