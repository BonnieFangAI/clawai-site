<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="orbGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="orbGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="orbGrad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0ABFC"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="orbitGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Orbital claw icon -->
  <g transform="translate(50, 35)">
    <!-- Outer orbit ring -->
    <ellipse cx="65" cy="70" rx="58" ry="22" fill="none" stroke="url(#orbGrad2)" stroke-width="1.5" opacity="0.3" transform="rotate(-25, 65, 70)"/>
    
    <!-- Inner orbit ring -->
    <ellipse cx="65" cy="70" rx="45" ry="18" fill="none" stroke="url(#orbGrad1)" stroke-width="1.5" opacity="0.25" transform="rotate(25, 65, 70)"/>
    
    <!-- Three claw arms radiating from center -->
    <path d="M 65 70 L 40 18" stroke="url(#orbGrad3)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 65 70 L 18 90" stroke="url(#orbGrad1)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 65 70 L 105 25" stroke="url(#orbGrad1)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Claw tips - small circles -->
    <circle cx="40" cy="18" r="5" fill="url(#orbGrad3)" opacity="0.9"/>
    <circle cx="18" cy="90" r="5" fill="url(#orbGrad1)" opacity="0.8"/>
    <circle cx="105" cy="25" r="5" fill="url(#orbGrad1)" opacity="0.9"/>
    
    <!-- Center core -->
    <circle cx="65" cy="70" r="12" fill="url(#orbGrad1)" opacity="0.15" filter="url(#orbitGlow)"/>
    <circle cx="65" cy="70" r="8" fill="url(#orbGrad1)" opacity="0.6"/>
    <circle cx="65" cy="70" r="4" fill="#F0EAFF"/>
    
    <!-- Tiny accent particles -->
    <circle cx="95" cy="82" r="2" fill="url(#orbGrad3)" opacity="0.5"/>
    <circle cx="30" cy="55" r="1.5" fill="url(#orbGrad1)" opacity="0.4"/>
  </g>

  <!-- Wordmark - more stylish -->
  <text x="200" y="110" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="72" letter-spacing="4">
    <tspan fill="#F8F8F8" font-weight="200">claw</tspan><tspan fill="url(#orbGrad1)" font-weight="700">AI</tspan>
  </text>
  
  <!-- Subtle gradient underline -->
  <rect x="200" y="122" width="120" height="2" rx="1" fill="url(#orbGrad1)" opacity="0.4"/>
  
  <!-- Tagline -->
  <text x="200" y="152" font-family="'Inter', 'SF Pro Display', sans-serif" font-size="13" font-weight="300" letter-spacing="7" fill="#888">
    YOUR LIFELONG AI BRAIN
  </text>
</svg>