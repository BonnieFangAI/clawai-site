<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9D5FF"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Glowing claw icon -->
  <g transform="translate(55, 35)" filter="url(#glow)">
    <!-- Three claw prongs - elegant curved -->
    <path d="M 25 15 C 15 15, 5 30, 5 55 C 5 70, 10 82, 20 92" 
          stroke="url(#neonGlow)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 60 2 C 60 2, 58 40, 60 92" 
          stroke="#E9D5FF" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 95 15 C 105 15, 115 30, 115 55 C 115 70, 110 82, 100 92" 
          stroke="url(#neonGlow)" stroke-width="6" stroke-linecap="round" fill="none"/>
    
    <!-- Grip arc with glow -->
    <path d="M 20 92 Q 60 120 100 92" 
          stroke="url(#neonGrad)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
    
    <!-- Energy core - layered glow -->
    <circle cx="60" cy="52" r="10" fill="url(#neonGrad)" opacity="0.2" filter="url(#softGlow)"/>
    <circle cx="60" cy="52" r="7" fill="url(#neonGrad)" opacity="0.5"/>
    <circle cx="60" cy="52" r="4" fill="#E9D5FF" opacity="0.95"/>
  </g>

  <!-- Text -->
  <text x="205" y="128" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="80" letter-spacing="2">
    <tspan fill="#F5F5F5" font-weight="200">claw</tspan><tspan fill="url(#neonGrad)" font-weight="700">AI</tspan>
  </text>
  
  <!-- Elegant thin line -->
  <line x1="205" y1="145" x2="580" y2="145" stroke="#2A2A2A" stroke-width="1"/>
  
  <!-- Tagline -->
  <text x="205" y="170" font-family="'Inter', 'SF Pro Display', sans-serif" font-size="15" font-weight="300" letter-spacing="8" fill="#666">
    YOUR AI, DEPLOYED
  </text>
</svg>